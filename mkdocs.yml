site_name: ZenithAFK Documentation
site_description: The ultimate AFK zone plugin for Paper 1.20+
site_author: GesooDiNazzZ
copyright: '&copy; 2025 GesooDiNazzZ — ZenithAFK'
repo_url: https://builtbybit.com/resources/zenithafk.107444/
repo_name: BuiltByBit

theme:
  name: material
  palette:
    - media: '(prefers-color-scheme: dark)'
      scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - media: '(prefers-color-scheme: light)'
      scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.tabs.link

plugins:
  - search:
      lang: [en]
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true
  - tables

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - First Zone: getting-started/first-zone.md
      - Configuration: getting-started/configuration.md
  - Features:
      - AFK Zones: features/zones.md
      - Reward System: features/rewards.md
      - Display System: features/display.md
      - Hard-AFK Detection: features/hard-afk.md
      - Anti-Abuse: features/anti-abuse.md
      - Time-Based Zones: features/time-zones.md
      - Playtime System: features/playtime.md
      - Multi-Server Sync: features/multi-server.md
  - Reference:
      - Commands: reference/commands.md
      - Permissions: reference/permissions.md
      - PlaceholderAPI: reference/placeholderapi.md
      - Zone Config: reference/zone-config.md
      - Lang Files: reference/lang-files.md
      - API: reference/api.md